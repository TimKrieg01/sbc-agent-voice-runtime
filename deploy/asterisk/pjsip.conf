; Minimal PJSIP config for Twilio trunking to Asterisk (initial non-hardened setup).
; Copy to /etc/asterisk/pjsip.conf and adjust placeholders.

[global]
type=global
user_agent=agentic-sip-edge

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

; ---------- Twilio inbound trunk endpoint ----------
[twilio-inbound]
type=endpoint
transport=transport-udp
context=from-twilio
disallow=all
allow=ulaw
direct_media=no
rtp_symmetric=yes
rewrite_contact=yes
force_rport=yes
aors=twilio-inbound

[twilio-inbound]
type=aor
max_contacts=10

; Identify Twilio traffic by source IP list.
; Add Twilio SIP signaling IPs for your region.
[twilio-identify]
type=identify
endpoint=twilio-inbound
match=54.172.60.0/23
match=34.203.250.0/23
match=54.244.51.0/24
match=54.171.127.192/26
match=35.156.191.128/25
match=3.122.181.0/24
match=18.228.249.0/24
match=177.71.206.192/26
match=3.104.90.0/24
match=3.25.42.128/25

