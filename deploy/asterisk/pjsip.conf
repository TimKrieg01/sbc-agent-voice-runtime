; Minimal PJSIP config for Twilio trunking to Asterisk.
; Copy to /etc/asterisk/pjsip.conf and adjust placeholders.
;
; This file includes both:
; - UDP transport on 5060 (legacy / transition)
; - TLS transport on 5061 (recommended for Secure SIP)

[global]
type=global
user_agent=agentic-sip-edge

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
; Required when Asterisk sits behind cloud/private networking (Azure VM, etc).
; Replace <PUBLIC_IP_OR_FQDN> with your VM public address.
external_signaling_address=<PUBLIC_IP_OR_FQDN>
external_media_address=<PUBLIC_IP_OR_FQDN>
; Adjust if your VM subnet differs.
local_net=10.0.0.0/8

[transport-tls]
type=transport
protocol=tls
bind=0.0.0.0:5061
; Required when Asterisk sits behind cloud/private networking (Azure VM, etc).
; Replace <PUBLIC_FQDN> with your public hostname (example: sip.agentvoiceruntime.com).
external_signaling_address=<PUBLIC_FQDN>
external_media_address=<PUBLIC_FQDN>
local_net=10.0.0.0/8
; Use a certificate whose CN/SAN matches the public hostname Twilio sends to.
cert_file=/etc/asterisk/keys/fullchain.pem
priv_key_file=/etc/asterisk/keys/privkey.pem
method=tlsv1_2
verify_client=no
verify_server=no

; ---------- Twilio inbound trunk endpoint ----------
[twilio-inbound]
type=endpoint
; Do not pin endpoint to a single transport so inbound identify works for UDP and TLS.
context=from-twilio
disallow=all
allow=ulaw
direct_media=no
rtp_symmetric=yes
rewrite_contact=yes
force_rport=yes
; Secure media (SRTP via SDES) for Twilio Secure Trunking.
media_encryption=sdes
media_use_received_transport=yes
aors=twilio-inbound

[twilio-inbound]
type=aor
max_contacts=10

; Identify Twilio traffic by source IP list.
; Add Twilio SIP signaling IPs for your region.
[twilio-identify]
type=identify
endpoint=twilio-inbound
match=54.172.60.0/23
match=34.203.250.0/23
match=54.244.51.0/24
match=54.171.127.192/26
match=35.156.191.128/25
match=3.122.181.0/24
match=18.228.249.0/24
match=177.71.206.192/26
match=3.104.90.0/24
match=3.25.42.128/25
