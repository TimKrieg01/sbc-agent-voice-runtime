; Minimal dialplan:
; inbound Twilio SIP INVITE -> Stasis(agentic)
; ARI worker will create externalMedia bridge to Python service.

[from-twilio]
exten => _+X!,1,NoOp(Inbound Twilio call to ${EXTEN})
 same => n,Answer()
 same => n,Stasis(agentic)
 same => n,Hangup()

exten => _X!,1,NoOp(Inbound Twilio call to ${EXTEN})
 same => n,Answer()
 same => n,Stasis(agentic)
 same => n,Hangup()
