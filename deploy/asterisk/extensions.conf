; Realtime SIP trunk dialplan (DB-backed).
; Admission must be validated before call is accepted:
;   1) endpoint identification in PJSIP (Sorcery/realtime)
;   2) ODBC route decision for host/auth/source-ip/called-number
; If route decision is reject, call is terminated before Stasis.

[globals]
AV_DEFAULT_REJECT_CAUSE=21

[inbound-realtime]
exten => _+X!,1,NoOp(Inbound realtime call E164: ${EXTEN} channel=${CHANNEL(name)})
 same => n,Gosub(av-route-precheck,s,1(${EXTEN}))
 same => n,GotoIf($["${AV_ROUTE_DECISION}"="allow"]?allow:reject)
 same => n(allow),NoOp(Route allow trunk=${AV_TRUNK_ID} route=${AV_ROUTE_ID} backend=${AV_BACKEND_URL} tenant=${AV_TENANT_ID})
 same => n,Stasis(agentic,${EXTEN},${PJSIP_HEADER(read,To)},${PJSIP_HEADER(read,X-Twilio-Username)},${AV_TRUNK_ID},${AV_BACKEND_URL},${AV_ROUTE_ID},${AV_TENANT_ID},${AV_STT_ENGINE},${AV_LANGUAGES})
 same => n,Hangup()
 same => n(reject),NoOp(Route reject reason=${AV_REJECT_REASON} cause=${AV_REJECT_CAUSE})
 same => n,Set(AV_FINAL_CAUSE=${IF($["${AV_REJECT_CAUSE}"=""]?${AV_DEFAULT_REJECT_CAUSE}:${AV_REJECT_CAUSE})})
 same => n,Hangup(${AV_FINAL_CAUSE})

exten => _X!,1,NoOp(Inbound realtime call national: ${EXTEN} channel=${CHANNEL(name)})
 same => n,Gosub(av-route-precheck,s,1(${EXTEN}))
 same => n,GotoIf($["${AV_ROUTE_DECISION}"="allow"]?allow:reject)
 same => n(allow),NoOp(Route allow trunk=${AV_TRUNK_ID} route=${AV_ROUTE_ID} backend=${AV_BACKEND_URL} tenant=${AV_TENANT_ID})
 same => n,Stasis(agentic,${EXTEN},${PJSIP_HEADER(read,To)},${PJSIP_HEADER(read,X-Twilio-Username)},${AV_TRUNK_ID},${AV_BACKEND_URL},${AV_ROUTE_ID},${AV_TENANT_ID},${AV_STT_ENGINE},${AV_LANGUAGES})
 same => n,Hangup()
 same => n(reject),NoOp(Route reject reason=${AV_REJECT_REASON} cause=${AV_REJECT_CAUSE})
 same => n,Set(AV_FINAL_CAUSE=${IF($["${AV_REJECT_CAUSE}"=""]?${AV_DEFAULT_REJECT_CAUSE}:${AV_REJECT_CAUSE})})
 same => n,Hangup(${AV_FINAL_CAUSE})

[av-route-precheck]
exten => s,1,NoOp(Realtime route precheck for called=${ARG1})
 same => n,Set(AV_CALLED=${ARG1})
 same => n,Set(AV_TO_HDR=${PJSIP_HEADER(read,To)})
 same => n,Set(AV_TO_URI=${CUT(AV_TO_HDR,<,2)})
 same => n,Set(AV_TO_URI=${CUT(AV_TO_URI,>,1)})
 same => n,ExecIf($["${AV_TO_URI}"=""]?Set(AV_TO_URI=${AV_TO_HDR}))
 same => n,Set(AV_TO_HOSTPORT=${CUT(AV_TO_URI,@,2)})
 same => n,Set(AV_TO_HOSTPORT=${CUT(AV_TO_HOSTPORT,\;,1)})
 same => n,Set(AV_INGRESS_HOST=${AV_TO_HOSTPORT})
 same => n,Set(AV_AUTH_USER=${PJSIP_HEADER(read,X-Twilio-Username)})
 same => n,Set(AV_VIA_HDR=${PJSIP_HEADER(read,Via)})
 same => n,Set(AV_SRC_IP=${CUT(AV_VIA_HDR, ,2)})
 same => n,Set(AV_SRC_IP=${CUT(AV_SRC_IP,:,1)})
 same => n,Set(AV_ROUTE_RAW=${ODBC_AV_ROUTE_DECIDE(${AV_INGRESS_HOST},${AV_CALLED},${AV_AUTH_USER},${AV_SRC_IP})})
 same => n,GotoIf($["${AV_ROUTE_RAW}"=""]?no_result)
 same => n,Set(AV_ROUTE_DECISION=${CUT(AV_ROUTE_RAW,^,1)})
 same => n,Set(AV_TRUNK_ID=${CUT(AV_ROUTE_RAW,^,2)})
 same => n,Set(AV_ROUTE_ID=${CUT(AV_ROUTE_RAW,^,3)})
 same => n,Set(AV_BACKEND_URL=${CUT(AV_ROUTE_RAW,^,4)})
 same => n,Set(AV_TENANT_ID=${CUT(AV_ROUTE_RAW,^,5)})
 same => n,Set(AV_STT_ENGINE=${CUT(AV_ROUTE_RAW,^,6)})
 same => n,Set(AV_LANGUAGES=${CUT(AV_ROUTE_RAW,^,7)})
 same => n,Set(AV_REJECT_REASON=${CUT(AV_ROUTE_RAW,^,8)})
 same => n,Set(AV_REJECT_CAUSE=${CUT(AV_ROUTE_RAW,^,9)})
 same => n,Return()
 same => n(no_result),Set(AV_ROUTE_DECISION=reject)
 same => n,Set(AV_REJECT_REASON=db_error_or_no_route)
 same => n,Set(AV_REJECT_CAUSE=41)
 same => n,Return()
