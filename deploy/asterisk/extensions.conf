; Multi-tenant SIP dialplan:
; Pass called number + SIP To header + auth username into ARI Stasis args.
; ARI worker resolves tenant from these immutable ingress hints.

[from-twilio]
exten => _+X!,1,NoOp(Inbound Twilio call to ${EXTEN})
 same => n,Answer()
 same => n,Stasis(agentic,${EXTEN},${PJSIP_HEADER(read,To)},${PJSIP_HEADER(read,X-Twilio-Username)})
 same => n,Hangup()

exten => _X!,1,NoOp(Inbound Twilio call to ${EXTEN})
 same => n,Answer()
 same => n,Stasis(agentic,${EXTEN},${PJSIP_HEADER(read,To)},${PJSIP_HEADER(read,X-Twilio-Username)})
 same => n,Hangup()
