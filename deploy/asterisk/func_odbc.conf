; Route decision function used by dialplan precheck.
; Expected SQL function:
;   resolve_inbound_route(ingress_host text, called_number text, auth_user text, source_ip text) returns text
; Return format:
;   decision^trunk_id^route_id^backend_url^tenant_id^stt_engine^languages_csv^reject_reason^reject_cause

[AV_ROUTE_DECIDE]
dsn=asterisk_cfg
mode=singlerow
readsql=SELECT resolve_inbound_route('${SQL_ESC(${ARG1})}','${SQL_ESC(${ARG2})}','${SQL_ESC(${ARG3})}','${SQL_ESC(${ARG4})}')
